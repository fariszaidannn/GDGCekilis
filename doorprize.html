<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GDG Doorprize Picker 🎉</title>
  <meta name="description" content="GDG event doorprize winner picker — randomly selects 3 winners from attendee list with history and name management." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060818;
      --surface: #0d1630;
      --surface2: #111d3c;
      --border: rgba(99,121,255,0.18);
      --accent: #6379ff;
      --accent2: #a855f7;
      --gold: #fbbf24;
      --silver: #94a3b8;
      --bronze: #f97316;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: rgba(99,121,255,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    #stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 20% 30%, rgba(99,121,255,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 70%, rgba(168,85,247,0.08) 0%, transparent 60%),
                  var(--bg);
    }
    #stars::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 35% 88%, rgba(255,255,255,0.5) 0%, transparent 100%);
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.5; } to { opacity: 1; } }

    /* ── Layout ── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Header ── */
    header {
      text-align: center; padding: 40px 0 32px;
    }
    .logo-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, rgba(99,121,255,0.15), rgba(168,85,247,0.15));
      border: 1px solid var(--border);
      border-radius: 100px; padding: 6px 18px;
      font-size: 13px; font-weight: 600; color: var(--accent);
      letter-spacing: 0.5px; margin-bottom: 20px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.1; margin-bottom: 12px;
    }
    .subtitle {
      color: var(--muted); font-size: 15px; font-weight: 400;
    }
    #participants-count {
      display: inline-block; margin-top: 10px;
      background: rgba(99,121,255,0.1); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 14px; font-size: 13px; font-weight: 600; color: var(--accent);
    }

    /* ── Main Grid ── */
    .grid { display: grid; gap: 20px; }
    @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative; overflow: hidden;
      transition: border-color 0.3s, transform 0.2s;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }
    .card:hover { border-color: rgba(99,121,255,0.4); transform: translateY(-2px); }
    .card-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 16px;
    }

    /* ── Winner Slots ── */
    .winner-slot {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px; padding: 18px 16px;
      margin-bottom: 12px; position: relative;
      min-height: 72px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.4s, background 0.4s, box-shadow 0.4s;
    }
    .winner-slot.revealed {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(251,191,36,0.2), inset 0 0 20px rgba(251,191,36,0.04);
      animation: revealPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .winner-slot:nth-child(2).revealed { border-color: var(--silver); box-shadow: 0 0 20px rgba(148,163,184,0.2), inset 0 0 20px rgba(148,163,184,0.04); }
    .winner-slot:nth-child(3).revealed { border-color: var(--bronze); box-shadow: 0 0 20px rgba(249,115,22,0.2), inset 0 0 20px rgba(249,115,22,0.04); }

    @keyframes revealPop {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .medal {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800;
      background: rgba(251,191,36,0.12); color: var(--gold);
      border: 1.5px solid rgba(251,191,36,0.3);
    }
    .winner-slot:nth-child(2) .medal { background: rgba(148,163,184,0.12); color: var(--silver); border-color: rgba(148,163,184,0.3); }
    .winner-slot:nth-child(3) .medal { background: rgba(249,115,22,0.12); color: var(--bronze); border-color: rgba(249,115,22,0.3); }

    .winner-name {
      font-size: 16px; font-weight: 700; color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
    }
    .winner-placeholder {
      font-size: 14px; font-weight: 400; color: var(--muted);
      font-style: italic;
    }

    /* ── Spin Button ── */
    #spin-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700; color: #fff;
      cursor: pointer; letter-spacing: 0.5px;
      position: relative; overflow: hidden;
      transition: opacity 0.3s, transform 0.15s, box-shadow 0.3s;
      box-shadow: 0 4px 24px rgba(99,121,255,0.35);
      margin-top: 8px;
    }
    #spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99,121,255,0.5);
    }
    #spin-btn:active:not(:disabled) { transform: scale(0.97); }
    #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #spin-btn .btn-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
      transform: translateX(-100%);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer { to { transform: translateX(200%); } }

    #remove-winners-btn {
      width: 100%; padding: 12px 16px; margin-top: 10px;
      background: rgba(239,68,68,0.08);
      border: 1.5px solid rgba(239,68,68,0.25);
      border-radius: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; color: var(--red);
      cursor: pointer; letter-spacing: 0.3px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    #remove-winners-btn:hover:not(:disabled) {
      background: rgba(239,68,68,0.18);
      border-color: rgba(239,68,68,0.5);
      transform: translateY(-1px);
    }
    #remove-winners-btn:active:not(:disabled) { transform: scale(0.97); }
    #remove-winners-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Spinning Animation ── */
    .spinning-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--muted);
      animation: spinNames 0.12s steps(1) infinite;
    }
    @keyframes spinNames {
      0%   { content: 'Picking...'; }
    }

    /* ── Participants List ── */
    .search-box {
      width: 100%; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px;
      outline: none; margin-bottom: 12px;
      transition: border-color 0.3s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .participants-list {
      max-height: 380px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
      padding-right: 4px;
    }
    .participants-list::-webkit-scrollbar { width: 4px; }
    .participants-list::-webkit-scrollbar-track { background: transparent; }
    .participants-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .participant-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 12px;
      transition: border-color 0.2s, opacity 0.3s;
    }
    .participant-item:hover { border-color: rgba(99,121,255,0.35); }
    .participant-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .remove-btn {
      width: 26px; height: 26px; border-radius: 6px; border: none;
      background: rgba(239,68,68,0.1); color: var(--red);
      cursor: pointer; font-size: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .remove-btn:hover { background: rgba(239,68,68,0.25); transform: scale(1.1); }

    /* ── History ── */
    .history-list {
      max-height: 340px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
      padding-right: 4px;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .history-entry {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

    .history-meta {
      font-size: 11px; color: var(--muted); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .history-round {
      background: rgba(99,121,255,0.12); color: var(--accent);
      border-radius: 4px; padding: 1px 6px; font-weight: 700;
    }
    .history-winners { display: flex; flex-direction: column; gap: 4px; }
    .history-winner-item {
      font-size: 12px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .history-winner-item .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-gold { background: var(--gold); }
    .dot-silver { background: var(--silver); }
    .dot-bronze { background: var(--bronze); }

    .empty-state {
      text-align: center; padding: 32px 16px;
      color: var(--muted); font-size: 13px;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

    .clear-history-btn {
      width: 100%; padding: 9px;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px; color: var(--red);
      font-size: 12px; font-weight: 600; cursor: pointer;
      margin-top: 10px; transition: background 0.2s;
    }
    .clear-history-btn:hover { background: rgba(239,68,68,0.15); }

    /* ── Confetti Canvas ── */
    #confetti-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Floating particles ── */
    .particle {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div id="stars"></div>
<canvas id="confetti-canvas"></canvas>

<div class="wrapper">
  <header>
    <div class="logo-badge">🎯 GDG Event</div>
    <h1>Doorprize Picker</h1>
    <p class="subtitle">Randomly selecting 3 lucky winners from participants</p>
    <div id="participants-count">Loading…</div>
  </header>

  <div class="grid">

    <!-- ── Winners Panel ── -->
    <div class="card" style="grid-column: span 1;">
      <div class="card-title">🏆 Winners</div>

      <div class="winner-slot" id="slot-1">
        <div class="medal">1</div>
        <div>
          <div class="winner-placeholder" id="name-1">Awaiting draw…</div>
        </div>
      </div>

      <div class="winner-slot" id="slot-2">
        <div class="medal">2</div>
        <div>
          <div class="winner-placeholder" id="name-2">Awaiting draw…</div>
        </div>
      </div>

      <div class="winner-slot" id="slot-3">
        <div class="medal">3</div>
        <div>
          <div class="winner-placeholder" id="name-3">Awaiting draw…</div>
        </div>
      </div>

      <button id="spin-btn" onclick="drawWinners()">
        <span class="btn-shimmer"></span>
        🎲 Draw Winners!
      </button>
      <button id="remove-winners-btn" onclick="removeWinnersFromList()" disabled>
        ✂️ Remove Winners from Participants
      </button>
    </div>

    <!-- ── Participants Panel ── -->
    <div class="card" style="grid-column: span 1;">
      <div class="card-title">👥 Participants <span id="count-badge" style="color:var(--accent);font-size:12px;margin-left:4px;"></span></div>
      <input class="search-box" id="search-input" type="text" placeholder="🔍  Search name…" oninput="renderParticipants()" />
      <div class="participants-list" id="participants-list"></div>
    </div>

    <!-- ── History Panel ── -->
    <div class="card" style="grid-column: span 1;">
      <div class="card-title">📜 Winner History</div>
      <div class="history-list" id="history-list">
        <div class="empty-state"><div class="icon">🕊️</div>No draws yet</div>
      </div>
      <button class="clear-history-btn" onclick="clearHistory()">🗑 Clear History</button>
    </div>

  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const NAMES_JSON = [
  "Esmanur Da***","ufuk pı***","Mehmet ÖZ***","Mehmet Fı***","Musa KO***",
  "Sudem ho***","Ahmet Do***","Emirhan Sö***","Müge Yı***","Elif Lü***",
  "ercan gu***","Kerem Bü***","Yusuf Ay***","Gemini Ai","Hızır ÜN***",
  "Sefer KU***","Eda Ub***","Umut DU***","ALİ UĞ***","Tayfun TE***",
  "Koray ÖZ***","Nisa Bo***","Eren Kü***","Muhammet PE***","Emre Bnc",
  "Ahmet Co***","Ebubekir AK***","Nur Gu***","Muzaffer AY***","Melisa AY***",
  "Aylin AK***","serdar şA***","Neslihan YI***","Yasir KA***","Efe AS***",
  "Erva Ba***","Oğuzhan KA***","Aynmable","ELIF KA***","Mehmet MU***",
  "nazan şA***","Yusuf DE***","Yasir KA***","Faris ZA***","Muhammed ÖZ***",
  "Sever ŞA***","Tarık DE***","Emre YÜ***","Yunus Emre TA***","Emine ER***",
  "Oguzhan CA***","Ömer SÜ***","Wan HA***","hamza ÖZ***","Halil TO***",
  "Aleyna MU***","Selcan","Egemen AL***","Salih YA***","Aliye HA***",
  "Bora ko***","Lalu Khairan S","Adham Mnbrs","Gülcan MA***","Emirhan TE***",
  "Ali ER***","Gizem ÖK***","Dogukaan BA***"
];

let participants = [...NAMES_JSON];
let history = JSON.parse(localStorage.getItem('gdg_doorprize_history') || '[]');
let round = history.length + 1;
let isDrawing = false;
let lastWinners = [];

// ── Init ──────────────────────────────────────────────────────────────
renderParticipants();
renderHistory();
updateCountBadge();

function updateCountBadge() {
  document.getElementById('participants-count').textContent = `${participants.length} participants remaining`;
  document.getElementById('count-badge').textContent = `(${participants.length})`;
}

// ── Render participants ───────────────────────────────────────────────
function renderParticipants() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('participants-list');
  const filtered = participants.filter(n => n.toLowerCase().includes(q));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>No names found</div>';
    return;
  }

  list.innerHTML = filtered.map((name, idx) => {
    const realIdx = participants.indexOf(name);
    return `
      <div class="participant-item" id="pi-${realIdx}">
        <span class="participant-name">${escHtml(name)}</span>
        <button class="remove-btn" onclick="removeName(${realIdx})" title="Remove">✕</button>
      </div>`;
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Remove name ───────────────────────────────────────────────────────
function removeName(idx) {
  const item = document.getElementById(`pi-${idx}`);
  if (item) {
    item.style.opacity = '0';
    item.style.transform = 'translateX(30px)';
    item.style.transition = 'all 0.3s ease';
  }
  setTimeout(() => {
    participants.splice(idx, 1);
    renderParticipants();
    updateCountBadge();
  }, 280);
}

// ── Draw Winners ──────────────────────────────────────────────────────
function drawWinners() {
  if (isDrawing) return;
  if (participants.length < 3) {
    shakeBtn();
    alert(`Not enough participants! Need at least 3, currently have ${participants.length}.`);
    return;
  }

  isDrawing = true;
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-shimmer"></span>🎲 Drawing…';

  // Reset slots
  for (let i = 1; i <= 3; i++) {
    const slot = document.getElementById(`slot-${i}`);
    slot.classList.remove('revealed');
    document.getElementById(`name-${i}`).className = 'winner-placeholder';
    document.getElementById(`name-${i}`).textContent = '…';
  }

  // Pick 3 unique random indices
  const pool = [...participants];
  const pickedIdxs = [];
  while (pickedIdxs.length < 3) {
    const r = Math.floor(Math.random() * pool.length);
    if (!pickedIdxs.includes(r)) pickedIdxs.push(r);
  }
  const winners = pickedIdxs.map(i => pool[i]);

  // Animate each slot with rolling effect
  winners.forEach((winner, wi) => {
    const nameEl = document.getElementById(`name-${wi + 1}`);
    const slotEl = document.getElementById(`slot-${wi + 1}`);

    let tick = 0;
    const totalTicks = 18 + wi * 10;
    const interval = setInterval(() => {
      const randName = participants[Math.floor(Math.random() * participants.length)];
      nameEl.textContent = randName;
      tick++;
      if (tick >= totalTicks) {
        clearInterval(interval);
        setTimeout(() => {
          nameEl.textContent = winner;
          nameEl.className = 'winner-name';
          slotEl.classList.add('revealed');
          if (wi === 2) {
            finalize(winners);
          }
        }, 100);
      }
    }, 80);
  });
}

function finalize(winners) {
  // Save to history
  lastWinners = winners;
  const entry = { round, time: new Date().toLocaleString(), winners };
  history.unshift(entry);
  localStorage.setItem('gdg_doorprize_history', JSON.stringify(history));
  round++;

  renderHistory();
  launchConfetti();

  const btn = document.getElementById('spin-btn');
  btn.disabled = false;
  btn.innerHTML = '<span class="btn-shimmer"></span>🎲 Draw Again!';
  document.getElementById('remove-winners-btn').disabled = false;
  isDrawing = false;
}

// ── Remove winners from pool ──────────────────────────────────────────
function removeWinnersFromList() {
  if (!lastWinners.length) return;
  const btn = document.getElementById('remove-winners-btn');
  btn.disabled = true;

  let removed = 0;
  lastWinners.forEach(winner => {
    const idx = participants.indexOf(winner);
    if (idx !== -1) {
      participants.splice(idx, 1);
      removed++;
    }
  });

  if (removed > 0) {
    renderParticipants();
    updateCountBadge();
    // Flash the button green as feedback
    btn.style.background = 'rgba(34,197,94,0.15)';
    btn.style.borderColor = 'rgba(34,197,94,0.5)';
    btn.style.color = 'var(--green)';
    btn.textContent = `✅ Removed ${removed} winner${removed > 1 ? 's' : ''} from list`;
    setTimeout(() => {
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
      btn.textContent = '✂️ Remove Winners from Participants';
    }, 2000);
  }
  lastWinners = [];
}

// ── Render History ────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-list');
  if (history.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🕊️</div>No draws yet</div>';
    return;
  }

  const medals = [
    { dot: 'dot-gold',   emoji: '🥇' },
    { dot: 'dot-silver', emoji: '🥈' },
    { dot: 'dot-bronze', emoji: '🥉' },
  ];

  el.innerHTML = history.map(entry => `
    <div class="history-entry">
      <div class="history-meta">
        <span class="history-round">Round ${entry.round}</span>
        <span>${entry.time}</span>
      </div>
      <div class="history-winners">
        ${entry.winners.map((w, i) => `
          <div class="history-winner-item">
            <span class="dot ${medals[i].dot}"></span>
            ${medals[i].emoji} ${escHtml(w)}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function clearHistory() {
  if (!confirm('Clear all winner history?')) return;
  history = [];
  round = 1;
  localStorage.removeItem('gdg_doorprize_history');
  renderHistory();
}

// ── Shake button ──────────────────────────────────────────────────────
function shakeBtn() {
  const btn = document.getElementById('spin-btn');
  btn.style.animation = 'shake 0.4s ease';
  setTimeout(() => btn.style.animation = '', 400);
}

// ── Confetti ──────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#fbbf24','#a855f7','#6379ff','#22c55e','#f97316','#ec4899','#06b6d4'];
  const pieces = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: 6 + Math.random() * 8,
    h: 10 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * 360,
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 5,
    vr: (Math.random() - 0.5) * 8,
    alpha: 1,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (frame > 90) p.alpha = Math.max(0, p.alpha - 0.015);
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rot * Math.PI) / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      if (p.alpha > 0) alive = true;
    });
    frame++;
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ── Resize confetti canvas ────────────────────────────────────────────
window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ── Add shake keyframe ────────────────────────────────────────────────
const style = document.createElement('style');
style.textContent = `@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}`;
document.head.appendChild(style);
</script>
